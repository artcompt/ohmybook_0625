function Ring({pct,color,size,stroke}){
  const sz=size||56,sw=stroke||5,r=(sz-sw*2)/2,circ=2*Math.PI*r,p=Math.min(100,pct||0),dash=(p/100)*circ;
  return(<svg width={sz} height={sz} style={{display:"block"}}><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={BORDER} strokeWidth={sw}/><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeDasharray={dash+" "+circ} strokeLinecap="round" transform={"rotate(-90 "+(sz/2)+" "+(sz/2)+")"}/>  <text x={sz/2} y={sz/2+4} textAnchor="middle" fontSize={11} fontWeight="600" fill={TEXT}>{p}%</text></svg>);
}
function Donut({data,colors,size}){
  const sz=size||88,total=data.reduce((a,b)=>a+b,0)||1,cx=sz/2,cy=sz/2,R=sz/2-4,r=R*0.52;let ang=-Math.PI/2;
  const sl=data.map((v,i)=>{const a=(v/total)*2*Math.PI,x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang),ix1=cx+r*Math.cos(ang),iy1=cy+r*Math.sin(ang);ang+=a;const x2=cx+R*Math.cos(ang),y2=cy+R*Math.sin(ang),ix2=cx+r*Math.cos(ang),iy2=cy+r*Math.sin(ang),lg=a>Math.PI?1:0,d="M"+x1+","+y1+"A"+R+","+R+" 0 "+lg+",1 "+x2+","+y2+"L"+ix2+","+iy2+"A"+r+","+r+" 0 "+lg+",0 "+ix1+","+iy1+"Z";return <path key={i} d={d} fill={colors[i]} stroke="#fff" strokeWidth={1}/>;});
  return(<svg width={sz} height={sz}>{sl}<circle cx={cx} cy={cy} r={r-1} fill="#fff"/><text x={cx} y={cy+3} textAnchor="middle" fontSize={9} fontWeight="700" fill={PRIMARY}>{total}</text></svg>);
}
function Stars({val}){return<span>{[1,2,3,4,5].map(i=><span key={i} style={{color:i<=val?"#e8a040":"#ddd",fontSize:11}}>★</span>)}</span>;}
function Toast({msg,onDone}){useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t);},[]);return<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#2d3a2e",color:"#fff",padding:"10px 20px",borderRadius:8,fontSize:12,zIndex:9999,whiteSpace:"nowrap"}}>{msg}</div>;}
function Confirm({msg,onOk,onCancel}){return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{background:"#fff",borderRadius:12,padding:24,width:280,textAlign:"center"}}><div style={{fontSize:13,color:TEXT,marginBottom:20,lineHeight:1.6}}>{msg}</div><div style={{display:"flex",gap:8}}><button onClick={onCancel} style={{flex:1,padding:"8px 0",border:"0.5px solid "+BORDER,background:"#fff",borderRadius:6,cursor:"pointer",fontSize:12}}>취소</button><button onClick={onOk} style={{flex:1,padding:"8px 0",background:CORAL,color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>삭제</button></div></div></div>);}

function BookCover({book,width,height,fontSize,style}){
  const w=width||44,h=height||60,fs=fontSize||8,base={width:w,height:h,borderRadius:4,flexShrink:0,overflow:"hidden",...style};
  if(book.thumbnail)return<div style={base}><img src={book.thumbnail} alt={book.title} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>;
  return<div style={{...base,background:book.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:fs,color:"#fff",textAlign:"center",padding:3,fontWeight:600,lineHeight:1.3}}>{book.title.slice(0,6)}</div>;
}

function BookCard({book,onClick,onDelete}){
  const sBg=book.status==="완독"?"#eaf3de":book.status==="읽는 중"?"#faeeda":"#f1efe8";
  const sC=book.status==="완독"?"#3b6d11":book.status==="읽는 중"?"#854f0b":"#888";
  return(<div style={{background:"#fff",border:"0.5px solid "+BORDER,borderRadius:8,padding:"10px",display:"flex",gap:10,alignItems:"flex-start",position:"relative"}}>
    <div onClick={()=>onClick(book)} style={{cursor:"pointer",flexShrink:0}}><BookCover book={book} width={44} height={60} fontSize={8}/></div>
    <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>onClick(book)}>
      <div style={{fontWeight:600,fontSize:12,color:TEXT,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{book.title}</div>
      <div style={{fontSize:10,color:MUTED}}>{book.author}</div>
      <div style={{display:"flex",alignItems:"center",gap:4,marginTop:3}}><span style={{fontSize:9,background:sBg,color:sC,padding:"1px 5px",borderRadius:3,fontWeight:500}}>{book.status}</span><span style={{fontSize:9,color:MUTED}}>{book.category}</span></div>
      {book.status==="읽는 중"&&<div style={{marginTop:4}}><div style={{height:3,background:BORDER,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:PRIMARY,width:Math.round((book.readPages/book.pages)*100)+"%",borderRadius:2}}/></div><div style={{fontSize:8,color:MUTED,marginTop:1}}>{book.readPages}p / {book.pages}p</div></div>}
    </div>
    <button onClick={e=>{e.stopPropagation();onDelete(book);}} style={{position:"absolute",top:6,right:6,width:20,height:20,border:"none",background:"transparent",cursor:"pointer",fontSize:13,color:"#ccc"}}>✕</button>
  </div>);
}

function EditModal({book,onClose,onUpdate,onDelete}){
  const [note,setNote]=useState(book.note||"");
  const [readPages,setReadPages]=useState(book.readPages);
  const [rating,setRating]=useState(book.rating);
  const [status,setStatus]=useState(book.status);
  const [thumbnail,setThumbnail]=useState(book.thumbnail||null);
  const [confirmDel,setConfirmDel]=useState(false);
  const readFile=file=>{if(!file||!file.type.startsWith("image/"))return;const r=new FileReader();r.onload=e=>setThumbnail(e.target.result);r.readAsDataURL(file);};
  const handleSave=()=>{onUpdate({...book,note,readPages,rating,status,thumbnail});onClose();};
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={{background:"#fff",borderRadius:12,padding:24,width:330,maxHeight:"88vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
          <div style={{flexShrink:0}}>{thumbnail?<img src={thumbnail} alt="cover" style={{width:60,height:80,objectFit:"cover",borderRadius:6,display:"block",border:"0.5px solid "+BORDER}}/>:<div style={{width:60,height:80,borderRadius:6,background:book.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",fontWeight:600,textAlign:"center",padding:4,lineHeight:1.3}}>{book.title.slice(0,6)}</div>}</div>
          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:TEXT}}>{book.title}</div><div style={{fontSize:11,color:MUTED,marginTop:2}}>{book.author}</div><div style={{fontSize:10,color:MUTED,marginTop:1}}>{book.category}</div></div>
        </div>
        <button onClick={()=>setConfirmDel(true)} style={{background:"#fff5f5",border:"0.5px solid #f0c0c0",color:CORAL,borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:11,fontWeight:500,flexShrink:0}}>🗑 삭제</button>
      </div>
      <label style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,padding:"10px 14px",background:"#f0f7f4",border:"1.5px dashed "+PRIMARY,borderRadius:8,cursor:"pointer"}}>
        <span style={{fontSize:22}}>📷</span>
        <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:PRIMARY}}>{thumbnail?"표지 이미지 변경":"표지 이미지 업로드"}</div><div style={{fontSize:10,color:MUTED,marginTop:1}}>클릭하여 JPG / PNG / WebP 선택</div></div>
        {thumbnail&&<button onClick={e=>{e.preventDefault();setThumbnail(null);}} style={{fontSize:10,color:CORAL,background:"none",border:"0.5px solid #f0c0c0",borderRadius:4,padding:"3px 7px",cursor:"pointer",flexShrink:0}}>제거</button>}
        <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>readFile(e.target.files[0])}/>
      </label>
      <div style={{marginBottom:12}}><label style={{fontSize:11,color:MUTED,display:"block",marginBottom:4}}>독서 상태</label><div style={{display:"flex",gap:6}}>{["미독","읽는 중","완독"].map(s=><button key={s} onClick={()=>setStatus(s)} style={{flex:1,padding:"6px 0",fontSize:11,border:"1px solid "+(status===s?PRIMARY:BORDER),background:status===s?PRIMARY:"#fff",color:status===s?"#fff":TEXT,borderRadius:5,cursor:"pointer",fontWeight:status===s?600:400}}>{s}</button>)}</div></div>
      {status==="읽는 중"&&<div style={{marginBottom:12}}><label style={{fontSize:11,color:MUTED,display:"block",marginBottom:4}}>읽은 페이지 ({readPages} / {book.pages}p)</label><input type="range" min={0} max={book.pages} step={1} value={readPages} onChange={e=>setReadPages(Number(e.target.value))} style={{width:"100%"}}/></div>}
      <div style={{marginBottom:12}}><label style={{fontSize:11,color:MUTED,display:"block",marginBottom:4}}>별점</label><div style={{display:"flex",gap:4}}>{[1,2,3,4,5].map(i=><span key={i} onClick={()=>setRating(i)} style={{fontSize:24,cursor:"pointer",color:i<=rating?"#e8a040":"#ddd"}}>★</span>)}</div></div>
      <div style={{marginBottom:16}}><label style={{fontSize:11,color:MUTED,display:"block",marginBottom:4}}>메모</label><textarea value={note} onChange={e=>setNote(e.target.value)} rows={3} style={{width:"100%",border:"0.5px solid "+BORDER,borderRadius:6,padding:"6px 8px",fontSize:12,resize:"none",outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/></div>

    </div>
    {confirmDel&&<Confirm msg={"\""+book.title+"\"을(를) 삭제할까요?"} onOk={()=>{onDelete(book.id);onClose();}} onCancel={()=>setConfirmDel(false)}/>}

function GoalsModal({goals,weekData,onSaveGoals,onSaveWeek,onClose}){

function LibraryPage({books,onSelect,onDelete,onAdd}){
  const [search,setSearch]=useState(""),[filter,setFilter]=useState("전체"),[sort,setSort]=useState("최신순");
  let list=books.filter(b=>filter==="전체"||b.status===filter).filter(b=>b.title.includes(search)||b.author.includes(search));
  if(sort==="제목순")list=[...list].sort((a,b)=>a.title.localeCompare(b.title));
  else if(sort==="평점순")list=[...list].sort((a,b)=>b.rating-a.rating);
  else list=[...list].sort((a,b)=>b.date.localeCompare(a.date));
  return(<div>
    <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 책 제목, 저자 검색..." style={{flex:1,border:"0.5px solid "+BORDER,borderRadius:6,padding:"6px 10px",fontSize:12,outline:"none"}}/><button onClick={onAdd} style={{padding:"6px 14px",background:PRIMARY,color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600,flexShrink:0}}>+ 책 추가</button></div>
    <div style={{display:"flex",gap:4,marginBottom:6,flexWrap:"wrap",alignItems:"center"}}>{["전체","완독","읽는 중","미독"].map(s=><button key={s} onClick={()=>setFilter(s)} style={{padding:"3px 10px",fontSize:11,border:"0.5px solid "+(filter===s?PRIMARY:BORDER),background:filter===s?PRIMARY:"#fff",color:filter===s?"#fff":TEXT,borderRadius:20,cursor:"pointer"}}>{s}</button>)}<select value={sort} onChange={e=>setSort(e.target.value)} style={{marginLeft:"auto",border:"0.5px solid "+BORDER,borderRadius:6,padding:"3px 8px",fontSize:11,outline:"none"}}>{["최신순","제목순","평점순"].map(s=><option key={s}>{s}</option>)}</select></div>

      <nav style={{flex:1,padding:"6px 0",overflowY:"auto"}}>{NAV.map(n=><div key={n.key} onClick={()=>setPage(n.key)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 12px",cursor:"pointer",color:page===n.key?"#fff":"rgba(255,255,255,0.6)",background:page===n.key?"rgba(255,255,255,0.15)":"transparent",borderLeft:page===n.key?"3px solid #7ec8a0":"3px solid transparent",fontSize:12,whiteSpace:"nowrap",overflow:"hidden"}}><span style={{fontSize:14,flexShrink:0}}>{n.icon}</span>{sidebarOpen&&n.label}</div>)}</nav>
      {sidebarOpen&&<div style={{margin:"8px 10px",background:"rgba(0,0,0,0.2)",borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:10,color:"rgba(255,255,255,0.7)",lineHeight:1.5,fontStyle:"italic"}}>"책은 가장 조용하고 변함없는 친구다."</div><div style={{fontSize:8,color:"rgba(255,255,255,0.4)",marginTop:3}}>— 찰스 W. 엘리엇</div></div>}
      <div style={{padding:"8px 10px",borderTop:"0.5px solid rgba(255,255,255,0.1)"}}><button onClick={()=>setSidebarOpen(s=>!s)} style={{width:"100%",background:"rgba(255,255,255,0.1)",border:"none",color:"rgba(255,255,255,0.6)",borderRadius:6,padding:"5px 0",cursor:"pointer",fontSize:12}}>{sidebarOpen?"◀ 접기":"▶"}</button></div>
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,overflow:"hidden"}}>
      <div style={{background:"#fff",padding:"0 16px",height:48,display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"0.5px solid "+BORDER,flexShrink:0}}>
        <div><span style={{fontSize:13,fontWeight:700,color:PRIMARY}}>{pageTitle}</span>{page==="home"&&<span style={{fontSize:10,color:MUTED,marginLeft:8}}>2026년 6월 14일 (일) · 오늘도 책과 함께 🌿</span>}</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {page!=="search"&&<input placeholder="🔍 검색..." onFocus={()=>setPage("search")} style={{border:"0.5px solid "+BORDER,borderRadius:6,padding:"4px 10px",fontSize:11,outline:"none",width:160}}/>}
          <button onClick={()=>setShowAdd(true)} style={{padding:"4px 12px",background:PRIMARY,color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:600}}>+ 추가</button>
          <div style={{position:"relative",width:28,height:28,background:BG,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",border:"0.5px solid "+BORDER}}><span style={{fontSize:14}}>🔔</span><span style={{position:"absolute",top:-3,right:-3,background:"#e05c3a",color:"#fff",fontSize:8,width:13,height:13,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>3</span></div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 14px"}}>
        {page==="home"&&<HomePage books={books} goals={goals} weekData={weekData} onCatDetail={()=>setShowCatDetail(true)} onEditGoals={()=>setShowGoalsEdit(true)}/>}
        {page==="library"&&<LibraryPage books={books} onSelect={setSelBook} onDelete={handleDelete} onAdd={()=>setShowAdd(true)}/>}
        {page==="purchase"&&<PurchasePage/>}
        {page==="reading"&&<ReadingPage books={books} onSelect={setSelBook} onDelete={handleDelete}/>}
        {page==="wishlist"&&<LibraryPage books={books.filter(b=>b.status==="미독")} onSelect={setSelBook} onDelete={handleDelete} onAdd={()=>setShowAdd(true)}/>}
        {page==="goals"&&<GoalsPage goals={goals} weekData={weekData} onEdit={()=>setShowGoalsEdit(true)}/>}
        {page==="stats"&&<StatsPage books={books}/>}
        {page==="quotes"&&<QuotesPage/>}
        {page==="search"&&<SearchPage books={books} onSelect={setSelBook} onDelete={handleDelete}/>}
        {page==="settings"&&<div style={{padding:24}}><div style={{fontSize:13,fontWeight:700,color:TEXT,marginBottom:16}}>⚙️ 설정</div><div style={{background:"#fff",border:"0.5px solid "+BORDER,borderRadius:10,padding:16}}><div style={{fontSize:12,fontWeight:600,color:TEXT,marginBottom:12}}>데이터 관리</div><button onClick={()=>{if(window.confirm("모든 데이터를 초기화할까요?")){setBooks(BOOKS_INIT);setGoals(GOALS_INIT);setWeekData(WEEK_INIT);showToast("🔄 초기화되었습니다");}}} style={{padding:"8px 16px",background:"#fff5f5",color:CORAL,border:"0.5px solid #f0c0c0",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>🗑 전체 데이터 초기화</button><div style={{fontSize:10,color:MUTED,marginTop:8}}>※ 데이터는 브라우저에 자동 저장됩니다.</div></div></div>}
      </div>
    </div>
    {showCatDetail&&<CatDetailModal onClose={()=>setShowCatDetail(false)}/>}
    {selBook&&<EditModal book={selBook} onClose={()=>setSelBook(null)} onUpdate={updateBook} onDelete={id=>{setSelBook(null);handleDelete(id);}}/>}
    {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onAdd={addBook}/>}
    {showGoalsEdit&&<GoalsModal goals={goals} weekData={weekData} onSaveGoals={setGoals} onSaveWeek={setWeekData} onClose={()=>setShowGoalsEdit(false)}/>}
    {confirmDel&&<Confirm msg={"\""+confirmDel.title+"\"을(를) 삭제할까요?"} onOk={()=>{deleteBook(confirmDel.id);setConfirmDel(null);}} onCancel={()=>setConfirmDel(null)}/>}
    {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
